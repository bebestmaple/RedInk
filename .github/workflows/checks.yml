name: Checks

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --locked

      - name: Run backend tests
        run: uv run pytest -q

      - name: Compile backend modules
        run: uv run python -m py_compile backend/errors.py backend/routes/*.py backend/generators/*.py backend/services/*.py

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        run: npm install -g pnpm@10.19.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
